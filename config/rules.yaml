# Game rules — the single source of rule truth. All engines read these via engines/rules.py.
# Edited from the on-device settings screen (previous file saved as rules.yaml.bak).
decks: 1
dealer_hits_soft_17: true
double_after_split: true
resplit_limit: 3
resplit_aces: false
late_surrender: false
blackjack_payout: 1.5      # 1.5 = 3:2, 1.2 = 6:5
double_restrictions: any2   # any2 | 9-11 | 10-11
